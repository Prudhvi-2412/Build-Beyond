name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: ci-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Backend syntax check
        run: node --check app.js

      - name: Backend SMTP utility syntax check
        run: |
          node --check utils/emailService.js
          node --check scripts/smtp-health-check.js

  backend-test:
    name: test-backend
    runs-on: ubuntu-latest
    needs:
      - backend-ci
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  frontend-ci:
    name: ci-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  frontend-test:
    name: test-frontend
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - backend-test
      - frontend-ci
      - frontend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate deploy hook secrets
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi
          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "Missing secret: BACKEND_HEALTHCHECK_URL"
            exit 1
          fi

      - name: Trigger Render backend deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          response_file=$(mktemp)
          status_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook HTTP status: $status_code"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Render deploy hook failed. Response body:"
            cat "$response_file"
            exit 1
          fi

          echo "Render deploy hook triggered successfully"

      - name: Wait for backend health check
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          max_attempts=20
          sleep_seconds=15
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            status_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BACKEND_HEALTHCHECK_URL")
            echo "Health check attempt $attempt/$max_attempts - HTTP $status_code"

            if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 300 ]; then
              echo "Backend is healthy"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep "$sleep_seconds"
            fi
            attempt=$((attempt + 1))
          done

          echo "Backend health check failed after $max_attempts attempts"
          exit 1

      - name: Trigger Vercel frontend deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          response_file=$(mktemp)
          status_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
          echo "Vercel deploy hook HTTP status: $status_code"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Vercel deploy hook failed. Response body:"
            cat "$response_file"
            exit 1
          fi

          echo "Vercel deploy hook triggered successfully"
